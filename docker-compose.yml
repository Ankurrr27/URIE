services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongo:27017/resubee
      AUTH_SECRET: replace-with-32-byte-random-secret
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      LATEX_COMPILE_ENABLED: "false"
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push && node server.js"

volumes:
  mongo-data:
