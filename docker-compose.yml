services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resubee
      POSTGRES_PASSWORD: resubee
      POSTGRES_DB: resubee
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resubee -d resubee"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://resubee:resubee@postgres:5432/resubee?schema=public
      AUTH_SECRET: replace-with-32-byte-random-secret
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      LATEX_COMPILE_ENABLED: "false"
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres-data:
