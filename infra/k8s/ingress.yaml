apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resubee
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - resubee.example.com
      secretName: resubee-tls
  rules:
    - host: resubee.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resubee
                port:
                  number: 80
